<svg width="1050" height="600" viewBox="0 0 1050 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a2e81" />
      <stop offset="50%" stop-color="#4632a9" />
      <stop offset="100%" stop-color="#6f63f1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7ccfe" />
      <stop offset="100%" stop-color="#6f63f1" />
    </linearGradient>
    <linearGradient id="marneeBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="headset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="1050" height="600" rx="20" fill="url(#bgGrad)" />

  <!-- Decorative circles -->
  <circle cx="900" cy="100" r="200" fill="#c7ccfe" opacity="0.08" />
  <circle cx="150" cy="500" r="150" fill="#6f63f1" opacity="0.1" />

  <!-- Accent line -->
  <rect x="60" y="200" width="4" height="120" rx="2" fill="url(#accentGrad)" />

  <!-- Marnee Logo Icon (scaled up) -->
  <g transform="translate(60, 50) scale(1.8)">
    <!-- Marnee body silhouette -->
    <path d="M18 34C26 34 32 28 32 20C32 12 26 8 18 8C10 8 4 12 4 20C4 28 10 34 18 34Z" fill="url(#marneeBody)" />
    <!-- Left ear -->
    <path d="M8 10C6 6 7 2 10 2C13 2 13 6 12 10" fill="url(#marneeBody)" />
    <!-- Right ear -->
    <path d="M28 10C30 6 29 2 26 2C23 2 23 6 24 10" fill="url(#marneeBody)" />
    <!-- Headset band -->
    <path d="M6 16C6 10 11 6 18 6C25 6 30 10 30 16" stroke="url(#headset)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <!-- Left headphone -->
    <rect x="2" y="14" width="5" height="8" rx="2" fill="url(#headset)" />
    <!-- Right headphone -->
    <rect x="29" y="14" width="5" height="8" rx="2" fill="url(#headset)" />
    <!-- Microphone arm -->
    <path d="M7 20C7 20 10 22 12 26" stroke="url(#headset)" stroke-width="2" stroke-linecap="round" fill="none" />
    <!-- Microphone tip -->
    <circle cx="13" cy="27" r="2.5" fill="url(#mic)" />
  </g>

  <!-- DNHub text logo -->
  <text x="135" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="white">
    <tspan font-weight="600">DN</tspan><tspan font-weight="300">Hub</tspan>
  </text>

  <!-- Name -->
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="white">
    Marco Antonio Prado
  </text>

  <!-- Title -->
  <text x="80" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#c7ccfe">
    Co-Founder
  </text>

  <!-- Contact info section -->
  <g transform="translate(80, 380)">
    <!-- Email icon -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="24" height="18" rx="3" stroke="#c7ccfe" stroke-width="2" fill="none" />
      <path d="M0 3L12 12L24 3" stroke="#c7ccfe" stroke-width="2" fill="none" />
    </g>
    <text x="36" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(203,188,198,0.98)">
      tonnypradog@hotmail.com
    </text>

    <!-- LinkedIn icon -->
    <g transform="translate(0, 50)">
      <rect x="0" y="0" width="22" height="22" rx="4" stroke="#c7ccfe" stroke-width="2" fill="none" />
      <text x="5" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#c7ccfe">in</text>
    </g>
    <text x="36" y="67" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(203,188,198,0.98)">
      linkedin.com/in/marco-antonio-prado-5188981b1
    </text>

    <!-- Website icon -->
    <g transform="translate(0, 100)">
      <circle cx="11" cy="11" r="10" stroke="#c7ccfe" stroke-width="2" fill="none" />
      <ellipse cx="11" cy="11" rx="4" ry="10" stroke="#c7ccfe" stroke-width="1.5" fill="none" />
      <line x1="1" y1="11" x2="21" y2="11" stroke="#c7ccfe" stroke-width="1.5" />
    </g>
    <text x="36" y="117" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(203,188,198,0.98)">
      dn-hub.com
    </text>
  </g>

  <!-- QR Code placeholder area -->
  <g transform="translate(780, 320)">
    <rect x="0" y="0" width="200" height="200" rx="12" fill="white" />
    <!-- QR will be embedded here - using image reference -->
    <image x="10" y="10" width="180" height="180" href="9yNwKb.svg" />
  </g>

  <!-- Tagline -->
  <text x="780" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(203,188,198,0.7)" text-anchor="start">
    AI-Powered Marketing Strategy
  </text>

</svg>
